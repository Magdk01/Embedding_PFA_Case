name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format . --check

      - name: Mypy
        run: uv run mypy .

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run tests with coverage
        run: |
          uv run coverage run -m pytest tests/
          uv run coverage report -m

  docker:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -f dockerfiles/api.dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/embedding-api:${{ github.ref_name }} .

      - name: Push image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/embedding-api:${{ github.ref_name }}

  release:
    name: Create GitHub release
    needs: [test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
